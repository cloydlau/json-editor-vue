name: ci
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # lts/* auto-tracks Active LTS, but resolving the alias hits GitHub's
      # node-versions API and can intermittently time out — retry once.
      - name: Set node version to LTS
        id: setup-node
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Retry set node version to LTS
        if: steps.setup-node.outcome == 'failure'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Use npmmirror registry
        run: pnpm config set registry https://registry.npmmirror.com

      - run: PUPPETEER_SKIP_DOWNLOAD=1 pnpm install

      - name: Lint
        run: npx lint-staged

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set node version to LTS
        id: setup-node
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Retry set node version to LTS
        if: steps.setup-node.outcome == 'failure'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Use npmmirror registry
        run: pnpm config set registry https://registry.npmmirror.com

      - run: PUPPETEER_SKIP_DOWNLOAD=1 pnpm install

      - name: Run unit tests
        run: pnpm run test:coverage
