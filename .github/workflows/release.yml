name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # This is required for requesting the JWT
  contents: write # 403 Forbidden error on changelogithub

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: |
          pnpm config set registry https://registry.npmmirror.com
          pnpm i
          pnpm build
          npx jsr publish --allow-dirty
        continue-on-error: true

      # 发布到 npm 的包不要带 postinstall（simple-git-hooks），避免终端用户安装时触发多余脚本 / pnpm approve-builds。
      # 只改 CI 工作区里的 package.json，不影响 git 仓库。
      - run: |
          node -e "
            const fs = require('fs')
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
            if (pkg.scripts?.postinstall) {
              delete pkg.scripts.postinstall
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n')
              console.log('Stripped postinstall from package.json for npm publish')
            }
          "
          npm publish --registry=https://registry.npmjs.org --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          npx -y cnpm sync
          curl -L https://npmmirror.com/sync/json-editor-vue
